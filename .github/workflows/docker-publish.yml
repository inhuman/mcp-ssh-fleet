name: Publish Docker image

on:
  push:
    tags: ["v*.*.*"]

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (multi-arch)
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mcp-ssh-fleet:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mcp-ssh-fleet:${{ github.ref_name }}

      # Supply-chain: SBOM + signing. Enable when cosign keys / OIDC and an SBOM
      # store are set up for the registry.
      # - name: SBOM (CycloneDX)
      #   uses: anchore/sbom-action@<pinned>
      #   with: { image: "${{ secrets.DOCKERHUB_USERNAME }}/mcp-ssh-fleet:${{ github.ref_name }}", format: cyclonedx-json }
      # - name: Sign (cosign keyless)
      #   run: cosign sign --yes "${{ secrets.DOCKERHUB_USERNAME }}/mcp-ssh-fleet@${{ steps.build.outputs.digest }}"
