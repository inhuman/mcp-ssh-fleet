name: Publish Docker image

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write
  id-token: write # OIDC auth to the MCP Registry (no secrets needed)

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Derive version (strip leading v)
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch)
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/mcp-ssh-fleet:latest
            ghcr.io/${{ github.repository_owner }}/mcp-ssh-fleet:${{ steps.v.outputs.version }}

      # --- Publish to the MCP Registry (registry.modelcontextprotocol.io) ---
      # Runs after the image is pushed, so the registry's OCI ownership check
      # (the io.modelcontextprotocol.server.name label) can pull it anonymously.
      - name: Pin server.json to this release
        run: |
          jq --arg v "${{ steps.v.outputs.version }}" \
             --arg img "ghcr.io/${{ github.repository_owner }}/mcp-ssh-fleet:${{ steps.v.outputs.version }}" \
             '.version = $v | .packages[0].identifier = $img' server.json > server.tmp
          mv server.tmp server.json

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

      # Supply-chain: SBOM + signing. Enable when cosign keys / OIDC and an SBOM
      # store are set up.
      # - name: Sign (cosign keyless)
      #   run: cosign sign --yes "ghcr.io/${{ github.repository_owner }}/mcp-ssh-fleet@${{ steps.build.outputs.digest }}"
