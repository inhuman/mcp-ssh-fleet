# Example fleet inventory (mounted as a configmap at /etc/ssh-fleet/inventory.yaml).
# The only source of reachable hosts — an allowlist (fail-closed): a host absent from this
# file is never connected to. The model never writes it and never passes it in arguments.
#
# name  — unique host id (used by ssh_exec and in response sections)
# addr  — IP or DNS name (non-empty)
# user  — SSH user (non-empty)
# port  — defaults to 22
# tags  — addressing labels (like GitLab runner tags); ssh_probe matches them with AND
hosts:
  - name: stand-a-1
    addr: 10.0.0.11
    user: root
    tags: [stand-a, test]
  - name: stand-a-2
    addr: 10.0.0.12
    user: ubuntu
    port: 2222
    tags: [stand-a, test]
  - name: stand-b-1
    addr: 10.0.0.21
    user: admin
    tags: [stand-b]
